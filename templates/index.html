<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripAI — AI Travel Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', light: '#818cf8' }
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0a0a0f; color: white; }
    .glow { box-shadow: 0 0 40px rgba(99,102,241,0.15); }
    .gradient-text { background: linear-gradient(135deg, #818cf8, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="min-h-screen font-sans">
  <!-- Ambient -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 left-1/4 w-[500px] h-[500px] rounded-full bg-indigo-600/20 blur-[120px]"></div>
    <div class="absolute bottom-0 right-1/4 w-[400px] h-[400px] rounded-full bg-cyan-500/15 blur-[100px]"></div>
  </div>

  <!-- Nav -->
  <nav class="border-b border-white/5 backdrop-blur-xl bg-white/[0.02] sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-cyan-500 flex items-center justify-center font-bold text-sm">T</div>
        <span class="font-semibold text-lg">TripAI</span>
      </div>
      <button class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-sm font-medium transition-colors">Plan free trip</button>
    </div>
  </nav>

  <!-- Hero -->
  <div class="max-w-4xl mx-auto px-6 pt-20 pb-12 text-center">
    <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-indigo-500/30 bg-indigo-500/10 text-indigo-300 text-xs font-medium mb-6">
      <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse"></span>
      AI-powered trip planning
    </div>
    <h1 class="text-5xl md:text-6xl font-bold tracking-tight mb-4">
      Your perfect trip,<br><span class="gradient-text">planned in seconds</span>
    </h1>
    <p class="text-white/50 text-lg mb-10">Tell us where you want to go. AI builds a day-by-day itinerary tailored to your interests and budget.</p>

    <!-- Form -->
    <div class="rounded-2xl border border-white/10 bg-white/[0.03] backdrop-blur-xl p-8 text-left glow">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
        <div>
          <label class="text-xs text-white/50 uppercase tracking-wider mb-2 block">Destination</label>
          <input id="destination" type="text" placeholder="Paris, Tokyo, Bali..." class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:border-indigo-500/60 transition-all" />
        </div>
        <div>
          <label class="text-xs text-white/50 uppercase tracking-wider mb-2 block">Duration (days)</label>
          <input id="duration" type="number" value="5" min="1" max="30" class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500/60 transition-all" />
        </div>
        <div>
          <label class="text-xs text-white/50 uppercase tracking-wider mb-2 block">Budget</label>
          <select id="budget" class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500/60 transition-all">
            <option value="budget">Budget</option>
            <option value="moderate" selected>Moderate</option>
            <option value="luxury">Luxury</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-white/50 uppercase tracking-wider mb-2 block">Travel style</label>
          <select id="style" class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500/60 transition-all">
            <option value="relaxed">Relaxed</option>
            <option value="balanced" selected>Balanced</option>
            <option value="packed">Action-packed</option>
          </select>
        </div>
      </div>
      <div class="mb-5">
        <label class="text-xs text-white/50 uppercase tracking-wider mb-2 block">Interests (comma-separated)</label>
        <input id="interests" type="text" placeholder="food, culture, hiking, art, nightlife..." class="w-full bg-white/[0.04] border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:border-indigo-500/60 transition-all" />
      </div>
      <button onclick="generateItinerary()" class="w-full py-3.5 rounded-xl bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 font-semibold text-sm transition-all flex items-center justify-center gap-2">
        <span id="btn-text">Generate my itinerary ✦</span>
      </button>
    </div>
  </div>

  <!-- Result -->
  <div id="result" class="max-w-4xl mx-auto px-6 pb-24 hidden">
    <div class="rounded-2xl border border-white/10 bg-white/[0.03] backdrop-blur-xl p-8">
      <h2 class="text-2xl font-bold mb-2" id="result-title"></h2>
      <p class="text-white/50 mb-6" id="result-overview"></p>
      <div id="days-container" class="space-y-4"></div>
    </div>
  </div>

  <script>
    async function generateItinerary() {
      const btn = document.getElementById('btn-text');
      btn.textContent = 'Planning your trip...';

      const body = {
        destination: document.getElementById('destination').value,
        duration: parseInt(document.getElementById('duration').value),
        budget: document.getElementById('budget').value,
        travel_style: document.getElementById('style').value,
        interests: document.getElementById('interests').value.split(',').map(s => s.trim()).filter(Boolean),
      };

      try {
        const res = await fetch('/api/generate-itinerary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        renderItinerary(data.itinerary);
      } catch (e) {
        alert('Error generating itinerary. Please try again.');
      } finally {
        btn.textContent = 'Generate my itinerary ✦';
      }
    }

    function renderItinerary(itinerary) {
      if (itinerary.raw) {
        document.getElementById('result-title').textContent = 'Your Itinerary';
        document.getElementById('result-overview').textContent = itinerary.raw;
        document.getElementById('days-container').innerHTML = '';
        document.getElementById('result').classList.remove('hidden');
        return;
      }

      document.getElementById('result-title').textContent = `${itinerary.destination} — ${itinerary.duration} Days`;
      document.getElementById('result-overview').textContent = itinerary.overview || '';

      const container = document.getElementById('days-container');
      container.innerHTML = (itinerary.days || []).map(day => `
        <div class="rounded-xl border border-white/8 bg-white/[0.02] p-6">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 rounded-lg bg-indigo-500/20 text-indigo-300 flex items-center justify-center text-sm font-bold">${day.day}</div>
            <div>
              <div class="font-semibold">${day.theme}</div>
              ${day.tips ? `<div class="text-xs text-white/40 mt-0.5">${day.tips}</div>` : ''}
            </div>
          </div>
          <div class="grid grid-cols-3 gap-3">
            ${['morning','afternoon','evening'].map(t => day[t] ? `
              <div class="rounded-lg bg-white/[0.03] border border-white/5 p-3">
                <div class="text-xs text-white/40 uppercase mb-1">${t}</div>
                <div class="text-sm font-medium">${day[t].activity}</div>
                <div class="text-xs text-white/40 mt-1">${day[t].location} · ${day[t].duration}</div>
                ${day[t].cost ? `<div class="text-xs text-cyan-400 mt-1">${day[t].cost}</div>` : ''}
              </div>` : '').join('')}
          </div>
        </div>`).join('');

      document.getElementById('result').classList.remove('hidden');
      document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
